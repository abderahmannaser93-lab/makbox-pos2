<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAK BOX — Çevrimdışı</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #111;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 4px; color: #D32F2F; margin-bottom: 8px; }
  .icon { font-size: 72px; margin: 24px 0; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; margin-bottom: 12px; }
  p  { color: #888; font-size: 15px; line-height: 1.6; max-width: 300px; }
  .retry-btn {
    margin-top: 32px;
    background: #D32F2F; color: #fff; border: none;
    border-radius: 12px; padding: 14px 36px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px; letter-spacing: 2px;
    cursor: pointer;
  }
  .hint { margin-top: 24px; font-size: 12px; color: #555; }
</style>
</head>
<body>
  <div class="logo">MAK BOX</div>
  <div class="icon">📡</div>
  <h1>İNTERNET BAĞLANTISI YOK</h1>
  <p>Sunucuya bağlanılamıyor. Lütfen Wi-Fi veya ağ bağlantınızı kontrol edin.</p>
  <button class="retry-btn" onclick="location.reload()">YENİDEN DENE</button>
  <div class="hint">Bağlantı sağlandığında otomatik olarak devam edecek.</div>
  <script>
    // Auto-retry every 10 seconds
    setInterval(() => {
      fetch('/api/health').then(r => { if (r.ok) location.reload(); }).catch(() => {});
    }, 10000);
  </script>
</body>
</html>
